<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온길 — Teacher & Growth Coach</title>
  <meta name="description" content="나답게 성장해 가는 여정을 따뜻한 시선으로 기록하는 사람, 온길." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Nanum+Gothic:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf6f0; --warm-white: #fff9f3;
      --amber: #c9894b; --amber-light: #e8b47a; --amber-pale: #f5e0c8;
      --brown: #7a5c3a; --dark: #2e2318; --text: #4a3f33;
      --muted: #9a8878; --line: #e8ddd2; --section-bg: #f5ede3;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: 'Gowun Batang', serif; line-height: 1.85; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.45;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.1rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
      background: rgba(250,246,240,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid transparent; transition: border-color 0.3s;
    }
    nav.scrolled { border-bottom-color: var(--line); }
    .nav-logo { font-family: 'Nanum Myeongjo', serif; font-size: 1.15rem; font-weight: 800; color: var(--dark); text-decoration: none; letter-spacing: 0.05em; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: 'Nanum Gothic', sans-serif; font-size: 0.7rem; letter-spacing: 0.22em; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--amber); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: var(--dark); }
    .mobile-menu { display: none; position: fixed; top: 56px; left: 0; right: 0; background: var(--cream); border-bottom: 1px solid var(--line); padding: 1.5rem 2.5rem; z-index: 99; flex-direction: column; gap: 1.2rem; }
    .mobile-menu a { font-family: 'Nanum Gothic', sans-serif; font-size: 0.85rem; letter-spacing: 0.2em; color: var(--text); text-decoration: none; text-transform: uppercase; }
    .mobile-menu.open { display: flex; }

    /* HERO */
    .hero {
      min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; text-align: center; padding: 6rem 2rem 4rem; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 65% 55% at 25% 65%, rgba(201,137,75,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 60% at 78% 28%, rgba(232,180,122,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 55% 80%, rgba(201,137,75,0.07) 0%, transparent 55%), var(--cream);
    }
    .hero::before { content: ''; position: absolute; width: 100%; height: 1px; top: 17%; background: var(--line); opacity: 0.5; }
    .hero::after  { content: ''; position: absolute; width: 100%; height: 1px; bottom: 17%; background: var(--line); opacity: 0.4; }
    .hero-vline1, .hero-vline2 { position: absolute; width: 1px; height: 100%; top: 0; background: var(--line); opacity: 0.4; }
    .hero-vline1 { left: 11%; } .hero-vline2 { right: 11%; }
    .corner { position: absolute; width: 28px; height: 28px; }
    .corner-tl { top: 20%; left: 12.5%; border-top: 1px solid var(--amber-light); border-left: 1px solid var(--amber-light); }
    .corner-tr { top: 20%; right: 12.5%; border-top: 1px solid var(--amber-light); border-right: 1px solid var(--amber-light); }
    .corner-bl { bottom: 20%; left: 12.5%; border-bottom: 1px solid var(--amber-light); border-left: 1px solid var(--amber-light); }
    .corner-br { bottom: 20%; right: 12.5%; border-bottom: 1px solid var(--amber-light); border-right: 1px solid var(--amber-light); }
    .hero-content { position: relative; z-index: 2; max-width: 700px; }
    .hero-eyebrow { font-family: 'Nanum Gothic', sans-serif; font-size: 0.68rem; letter-spacing: 0.42em; color: var(--amber); text-transform: uppercase; margin-bottom: 2.2rem; opacity: 0; animation: fadeUp 0.9s ease 0.2s forwards; }
    .hero-name { font-family: 'Nanum Myeongjo', serif; font-size: clamp(4.5rem, 14vw, 9rem); font-weight: 800; color: var(--dark); letter-spacing: -0.02em; line-height: 0.95; margin-bottom: 0.6rem; opacity: 0; animation: fadeUp 1s ease 0.4s forwards; }
    .hero-identity { font-family: 'Nanum Gothic', sans-serif; font-size: clamp(0.72rem, 1.8vw, 0.9rem); letter-spacing: 0.3em; color: var(--muted); margin-bottom: 2.8rem; opacity: 0; animation: fadeUp 1s ease 0.6s forwards; }
    .hero-identity em { font-style: normal; color: var(--amber); }
    .hero-divider { width: 1px; height: 52px; background: linear-gradient(to bottom, var(--amber-light), transparent); margin: 0 auto 2.8rem; opacity: 0; animation: fadeUp 1s ease 0.75s forwards; }
    .hero-tagline { font-size: clamp(1rem, 2.3vw, 1.18rem); color: var(--brown); line-height: 2.1; max-width: 500px; margin: 0 auto 1.5rem; word-break: keep-all; opacity: 0; animation: fadeUp 1s ease 0.9s forwards; }
    .hero-quote { font-size: 0.82rem; color: var(--muted); font-style: italic; letter-spacing: 0.05em; margin-bottom: 2.5rem; opacity: 0; animation: fadeUp 1s ease 1s forwards; }
    .hero-cta { display: inline-flex; align-items: center; gap: 0.75rem; font-family: 'Nanum Gothic', sans-serif; font-size: 0.72rem; letter-spacing: 0.25em; color: var(--amber); text-decoration: none; border: 1px solid var(--amber-light); padding: 0.8rem 2rem; border-radius: 999px; background: rgba(201,137,75,0.05); transition: background 0.3s, transform 0.3s; opacity: 0; animation: fadeUp 1s ease 1.1s forwards; }
    .hero-cta:hover { background: rgba(201,137,75,0.12); transform: translateY(-2px); }
    .hero-cta .arrow { transition: transform 0.25s; }
    .hero-cta:hover .arrow { transform: translateX(4px); }
    .scroll-hint { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0; animation: fadeIn 1s ease 1.6s forwards; }
    .scroll-hint span { font-family: 'Nanum Gothic', sans-serif; font-size: 0.6rem; letter-spacing: 0.3em; color: var(--muted); }
    .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--amber-light), transparent); animation: scrollPulse 2s ease-in-out infinite; }

    /* SECTIONS */
    .section-wrap { max-width: 920px; margin: 0 auto; padding: 7rem 2rem; }
    .alt-bg { background: var(--section-bg); }
    .alt-bg .section-wrap { max-width: 920px; margin: 0 auto; }
