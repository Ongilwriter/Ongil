<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온길 — Teacher & Growth Coach</title>
  <meta name="description" content="나답게 성장해 가는 여정을 따뜻한 시선으로 기록하는 사람, 온길." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Nanum+Gothic:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf6f0; --warm-white: #fff9f3;
      --amber: #c9894b; --amber-light: #e8b47a; --amber-pale: #f5e0c8;
      --brown: #7a5c3a; --dark: #2e2318; --text: #4a3f33;
      --muted: #9a8878; --line: #e8ddd2; --section-bg: #f5ede3;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: 'Gowun Batang', serif; line-height: 1.85; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.45;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.1rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
      background: rgba(250,246,240,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid transparent; transition: border-color 0.3s;
    }
    nav.scrolled { border-bottom-color: var(--line); }
    .nav-logo { font-family: 'Nanum Myeongjo', serif; font-size: 1.15rem; font-weight: 800; color: var(--dark); text-decoration: none; letter-spacing: 0.05em; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-family: 'Nanum Gothic', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--amber); }

    /* HERO */
    .hero {
      min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; text-align: center; padding: 6rem 2rem 4rem; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 65% 55% at 25% 65%, rgba(201,137,75,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 60% at 78% 28%, rgba(232,180,122,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 55% 80%, rgba(201,137,75,0.07) 0%, transparent 55%), var(--cream);
    }
    .hero-content { position: relative; z-index: 2; max-width: 700px; }
    .hero-name { font-family: 'Nanum Myeongjo', serif; font-size: clamp(4.5rem, 14vw, 9rem); font-weight: 800; color: var(--dark); letter-spacing: -0.02em; line-height: 0.95; margin-bottom: 0.6rem; animation: fadeUp 1s ease forwards; }

    /* SECTIONS */
    .section-wrap { max-width: 920px; margin: 0 auto; padding: 7rem 2rem; }
    .alt-bg { background: var(--section-bg); }
    .label { font-family: 'Nanum Gothic', sans-serif; font-size: 0.65rem; letter-spacing: 0.45em; color: var(--amber); text-transform: uppercase; display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; }
    .label::after { content: ''; flex: 0 0 44px; height: 1px; background: var(--amber-light); }
    .section-title { font-family: 'Nanum Myeongjo', serif; font-size: clamp(1.9rem, 4.5vw, 2.7rem); font-weight: 700; color: var(--dark); line-height: 1.4; margin-bottom: 2.5rem; word-break: keep-all; }

    /* ABOUT (PHOTO) */
    .about-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 5rem; align-items: start; }
    .portrait { aspect-ratio: 1/1; background: var(--warm-white); border-radius: 50%; overflow: hidden; position: relative; border: 8px solid var(--warm-white); box-shadow: 0 10px 30px rgba(122,92,58,0.12); }
    .portrait img { width: 100%; height: 100%; object-fit: cover; }
    .portrait-badge { position: absolute; bottom: -8px; right: 20px; background: var(--amber); color: var(--warm-white); font-family: 'Nanum Gothic', sans-serif; font-size: 0.58rem; letter-spacing: 0.18em; padding: 0.5rem 0.9rem; border-radius: 999px; white-space: nowrap; font-weight: 700; }
    .about-body p { font-size: 1.05rem; margin-bottom: 1.6rem; line-height: 2; }
    .about-highlight { margin: 2.5rem 0; padding: 1.6rem 2rem; border-left: 3px solid var(--amber); background: rgba(201,137,75,0.06); }
    .about-highlight p { font-size: 1rem !important; color: var(--brown) !important; font-style: italic; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 2rem; }
    .chip { font-family: 'Nanum Gothic', sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; border: 1px solid var(--amber-light); color: var(--amber); padding: 0.35rem 1rem; border-radius: 999px; background: rgba(201,137,75,0.05); }

    /* AI SECTION STYLE */
    .ai-card { background: var(--dark); padding: 3rem; border-radius: 4px; color: var(--cream); text-align: center; }
    .ai-link { display: inline-block; background: var(--amber); color: var(--warm-white); text-decoration: none; padding: 1rem 2rem; border-radius: 999px; font-family: 'Nanum Gothic', sans-serif; font-size: 0.9rem; margin-top: 1.5rem; transition: transform 0.3s; }
    .ai-link:hover { transform: scale(1.05); background: var(--amber-light); }

    /* GROWTH & BOOKS & BLOG */
    .growth-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 3.5rem; }
    .growth-card { padding: 2.2rem 1.8rem; border: 1px solid var(--line); background: var(--warm-white); transition: transform 0.3s; }
    .growth-card:hover { transform: translateY(-5px); }
    .books-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.8rem; margin-top: 3rem; }
    .book-card { display: block; text-decoration: none; color: inherit; border: 1px solid var(--line); padding: 2.2rem 1.8rem; background: var(--warm-white); transition: transform 0.3s; }
    .book-card:hover { transform: translateY(-5px); border-color: var(--amber-light); }
    .blog-card { display: flex; align-items: center; gap: 2.5rem; padding: 2.8rem; border: 1px solid var(--line); background: var(--warm-white); text-decoration: none; color: inherit; transition: transform 0.3s; }
    .blog-card:hover { transform: translateY(-3px); }

    /* CONTACT */
    .contact-wrap { background: var(--dark); padding: 7rem 2rem; text-align: center; }
    .contact-title { font-family: 'Nanum Myeongjo', serif; font-size: 2.4rem; color: var(--cream); margin-bottom: 1rem; }
    .contact-email { color: var(--amber-light); text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid var(--amber-light); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
